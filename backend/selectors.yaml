# 네이버 모바일 플레이스 리뷰 페이지 CSS 셀렉터 (CLAUDE.md 규칙 5: 셀렉터는 여기에만).
#
# 실제 값은 모바일 플레이스 페이지(https://m.place.naver.com/...)를 직접 열어
# 개발자도구로 확인해 채운다 — 사람 확인 필요. 네이버 개편 시에도 이 파일만 고쳐
# 재배포 없이 복구한다(TECH_SPEC §3.3).
#
# 값이 비어 있으면 NaverCollector 가 명시적 에러를 던진다(구조는 완성, 값만 미정).
naver:
  review_item: ""    # 리뷰 하나를 감싸는 요소 (반복 단위)
  author: ""         # 작성자 표시명
  body: ""           # 리뷰 본문 텍스트
  rating: ""         # 별점 (텍스트 또는 aria-label 에 1~5)
  visited_at: ""     # 방문일 (예: "2026.7.1")
  more_button: ""    # "더보기" 페이지네이션 버튼
